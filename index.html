<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Optimistic Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: transparent;
            --chrome-bg: transparent;
            --chrome-border: rgba(255, 255, 255, 0.15);
            --text: rgba(255, 255, 255, 0.7);
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-bright: rgba(255, 255, 255, 0.95);
        }

        html, body {
            background: transparent !important;
            color: var(--text);
            font-family: 'SF Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-container {
            background: transparent !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .terminal-header {
            background: transparent !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .terminal-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 6px 16px;
        }

        .terminal-title svg {
            width: 18px;
            height: 18px;
        }

        .terminal-title span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
        }

        .connection-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-family: monospace;
        }

        .status-connected { color: #4ade80; }
        .status-disconnected { color: #f87171; }
        .status-connecting { color: #fbbf24; }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: transparent !important;
            font-size: 12px;
            line-height: 1.5;
        }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 1.2em;
            color: rgba(255, 255, 255, 0.7);
        }

        .terminal-line:empty {
            min-height: 0.3em;
        }

        .terminal-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: transparent !important;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .terminal-prompt {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: #4ade80;
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.9);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .terminal-input:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.4);
        }

        .terminal-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .terminal-output::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-output::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .terminal-output::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .ansi-red { color: #ff5f57; }
        .ansi-green { color: #4ade80; }
        .ansi-yellow { color: #fbbf24; }
        .ansi-blue { color: #6ab0f5; }
        .ansi-cyan { color: #6ab0f5; }
        .ansi-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 17 10 11 4 5"></polyline>
                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                <span>OPTIMISTIC TERMINAL</span>
            </div>
            <div class="connection-status status-connecting" id="connection-status">connecting</div>
        </div>
        <div class="terminal-output" id="terminal-output"></div>
        <div class="terminal-input-area">
            <div class="terminal-prompt" id="prompt">optimistic@optimistic:~$</div>
            <input type="text" class="terminal-input" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let commandHistory = [];
        let historyIndex = -1;

        const container = document.getElementById('terminal-output');
        const inputField = document.getElementById('command-input');
        const promptSpan = document.getElementById('prompt');
        const statusSpan = document.getElementById('connection-status');

        function cleanAnsi(text) {
            return text
                // Bracketed paste mode
                .replace(/\x1b\[\?2004[hl]/g, '')
                // Line wrapping mode (neofetch)
                .replace(/\x1b\[\?7[hl]/g, '')
                // OSC sequences (window titles, etc.)
                .replace(/\x1b\][^\x07]*\x07/g, '')
                .replace(/\x1b\][^\x1b]*\x1b\\/g, '')
                // Cursor movement
                .replace(/\x1b\[[\d;]*[ABCDEFGHJKSTfmn]/g, '')
                // Clear screen / line
                .replace(/\x1b\[[\d;]*[JK]/g, '')
                // Scroll region
                .replace(/\x1b\[[\d;]*[rs]/g, '')
                // Hide/show cursor
                .replace(/\x1b\[\?25[hl]/g, '')
                // Alternate screen buffer
                .replace(/\x1b\[\??1049[hl]/g, '')
                // Set/reset mode
                .replace(/\x1b\[[\d;]*[hl]/g, '')
                // Bell
                .replace(/\x07/g, '');
        }

        function parseANSICodes(text) {
            let html = cleanAnsi(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\x1b\[32m/g, '<span class="ansi-green">')
                .replace(/\x1b\[31m/g, '<span class="ansi-red">')
                .replace(/\x1b\[33m/g, '<span class="ansi-yellow">')
                .replace(/\x1b\[34m/g, '<span class="ansi-blue">')
                .replace(/\x1b\[36m/g, '<span class="ansi-cyan">')
                .replace(/\x1b\[1m/g, '<span class="ansi-bold">')
                .replace(/\x1b\[0m/g, '</span>');
            return html;
        }

        function updateStatus(status, message) {
            statusSpan.textContent = message;
            statusSpan.className = `connection-status status-${status}`;
            isConnected = status === 'connected';
            inputField.disabled = !isConnected;
            if (isConnected) inputField.focus();
        }

        function appendOutput(text) {
            if (!text) return;
            // Collapse multiple consecutive blank lines to max 1
            const lines = text.split('\n');
            let lastWasEmpty = false;
            for (const line of lines) {
                const isEmpty = !line.trim();
                if (isEmpty && lastWasEmpty) continue;
                lastWasEmpty = isEmpty;
                
                const div = document.createElement('div');
                div.className = 'terminal-line';
                div.innerHTML = parseANSICodes(line) || '&nbsp;';
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function sendCommand(cmd) {
            if (!cmd.trim()) return;
            commandHistory.unshift(cmd);
            historyIndex = -1;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'command', command: cmd }));
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            updateStatus('connecting', 'connecting');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('connected', 'connected');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    }
                } catch (e) {
                    appendOutput(event.data);
                }
            };
            
            ws.onclose = () => {
                updateStatus('disconnected', 'disconnected');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = () => {
                updateStatus('disconnected', 'error');
            };
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputField.value;
                inputField.value = '';
                sendCommand(cmd);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    inputField.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputField.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    inputField.value = '';
                }
            }
        });

        document.body.addEventListener('click', () => {
            if (!inputField.disabled) inputField.focus();
        });

        connectWebSocket();
    </script>
</body>
</html>
