<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Optimistic Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e0a;
            color: #b8d8b0;
            font-family: 'SF Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1e1a;
            padding: 10px 16px;
            border-bottom: 1px solid #2a3a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .terminal-title {
            color: #87b87f;
            font-weight: bold;
            font-size: 14px;
        }

        .connection-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
        }

        .status-connected { background: #1a3a1a; color: #87b87f; }
        .status-disconnected { background: #3a1a1a; color: #ff5f57; }
        .status-connecting { background: #3a3a1a; color: #febc2e; }

        .terminal-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #0a0e0a;
            font-size: 13px;
            line-height: 1.5;
        }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 1.5em;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #0d1208;
            border-top: 1px solid #2a3a2a;
            flex-shrink: 0;
        }

        .prompt {
            color: #87b87f;
            font-family: monospace;
            font-size: 13px;
            white-space: nowrap;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #b8d8b0;
            font-family: monospace;
            font-size: 13px;
        }

        .input-field:disabled {
            opacity: 0.4;
        }

        .terminal-container::-webkit-scrollbar { width: 6px; }
        .terminal-container::-webkit-scrollbar-track { background: #1a1e1a; }
        .terminal-container::-webkit-scrollbar-thumb { background: #2a3a2a; border-radius: 3px; }

        .ansi-red { color: #ff5f57; }
        .ansi-green { color: #87b87f; }
        .ansi-yellow { color: #febc2e; }
        .ansi-blue { color: #6ab0f5; }
        .ansi-cyan { color: #6ab0f5; }
        .ansi-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div class="terminal-title">Optimistic Terminal</div>
        <div class="connection-status status-connecting" id="connection-status">Connecting...</div>
    </div>
    <div class="terminal-container" id="terminal-container"></div>
    <div class="terminal-input-line">
        <span class="prompt" id="prompt">optimistic@optimistic:~$</span>
        <input type="text" class="input-field" id="command-input" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let commandHistory = [];
        let historyIndex = -1;

        const container = document.getElementById('terminal-container');
        const inputField = document.getElementById('command-input');
        const promptSpan = document.getElementById('prompt');
        const statusSpan = document.getElementById('connection-status');

        // Strip ALL problematic ANSI sequences
        function cleanAnsi(text) {
            return text
                // Bracketed paste mode
                .replace(/\x1b\[\?2004[hl]/g, '')
                // OSC sequences (window titles, etc.)
                .replace(/\x1b\][^\x07]*\x07/g, '')
                .replace(/\x1b\][^\x1b]*\x1b\\/g, '')
                // Cursor movement
                .replace(/\x1b\[[\d;]*[ABCDEFGHJKSTfmn]/g, '')
                // Clear screen / line
                .replace(/\x1b\[[\d;]*[JK]/g, '')
                // Scroll region
                .replace(/\x1b\[[\d;]*[rs]/g, '')
                // Hide/show cursor
                .replace(/\x1b\[\?25[hl]/g, '')
                // Alternate screen buffer
                .replace(/\x1b\[\??1049[hl]/g, '')
                // Set/reset mode
                .replace(/\x1b\[[\d;]*[hl]/g, '')
                // Bell
                .replace(/\x07/g, '');
        }

        function parseANSICodes(text) {
            let html = cleanAnsi(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\x1b\[32m/g, '<span class="ansi-green">')
                .replace(/\x1b\[31m/g, '<span class="ansi-red">')
                .replace(/\x1b\[33m/g, '<span class="ansi-yellow">')
                .replace(/\x1b\[34m/g, '<span class="ansi-blue">')
                .replace(/\x1b\[36m/g, '<span class="ansi-cyan">')
                .replace(/\x1b\[1m/g, '<span class="ansi-bold">')
                .replace(/\x1b\[0m/g, '</span>');
            return html;
        }

        function updateStatus(status, message) {
            statusSpan.textContent = message;
            statusSpan.className = `connection-status status-${status}`;
            isConnected = status === 'connected';
            inputField.disabled = !isConnected;
            if (isConnected) inputField.focus();
        }

        function appendOutput(text) {
            if (!text) return;
            const lines = text.split('\n');
            for (const line of lines) {
                const div = document.createElement('div');
                div.className = 'terminal-line';
                div.innerHTML = parseANSICodes(line) || '&nbsp;';
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function sendCommand(cmd) {
            if (!cmd.trim()) return;
            
            commandHistory.unshift(cmd);
            historyIndex = -1;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'command', command: cmd }));
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            updateStatus('connecting', 'Connecting...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('connected', 'Connected');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    }
                } catch (e) {
                    appendOutput(event.data);
                }
            };
            
            ws.onclose = () => {
                updateStatus('disconnected', 'Disconnected');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = () => {
                updateStatus('disconnected', 'Error');
            };
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputField.value;
                inputField.value = '';
                sendCommand(cmd);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    inputField.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputField.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    inputField.value = '';
                }
            }
        });

        document.body.addEventListener('click', () => {
            if (!inputField.disabled) inputField.focus();
        });

        connectWebSocket();
    </script>
</body>
</html>
