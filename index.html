<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GNU Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: transparent;
            --chrome-bg: transparent;
            --chrome-border: rgba(255, 255, 255, 0.15);
            --text: rgba(255, 255, 255, 0.7);
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-bright: rgba(255, 255, 255, 0.95);
        }

        body {
            background: transparent;
            color: var(--text);
            font-family: 'SF Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-container {
            background: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .terminal-header {
            background: transparent;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .terminal-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 6px 16px;
        }

        .terminal-title svg {
            width: 18px;
            height: 18px;
        }

        .terminal-title span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .status-connected { color: #4ade80; }
        .status-disconnected { color: #f87171; }
        .status-connecting { color: #fbbf24; }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: transparent;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .terminal-line {
            margin-bottom: 2px;
            white-space: pre-wrap;
            word-break: break-all;
            color: rgba(255, 255, 255, 0.7);
        }

        .terminal-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: transparent;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .terminal-prompt {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: #4ade80;
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.9);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .terminal-input:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.4);
        }

        .terminal-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .terminal-output::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-output::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .terminal-output::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .ansi-black { color: #000000; }
        .ansi-red { color: #f87171; }
        .ansi-green { color: #4ade80; }
        .ansi-yellow { color: #fbbf24; }
        .ansi-blue { color: #60a5fa; }
        .ansi-magenta { color: #c084fc; }
        .ansi-cyan { color: #22d3ee; }
        .ansi-white { color: #ffffff; }
        .ansi-bold { font-weight: bold; }
    </style>
</head>
<body>
<div class="terminal-container">
    <div class="terminal-header">
        <div class="terminal-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5">
                <path d="M4 4h16v16H4z"/>
                <path d="M8 8l4 4-4 4"/>
                <path d="M16 16l-4-4 4-4"/>
            </svg>
            <span>GNU TERMINAL</span>
        </div>
        <div class="status status-connecting" id="status">starting</div>
    </div>
    <div class="terminal-output" id="output">
        <div class="terminal-line" style="color:#4ade80">─────────────────────────────────────────</div>
        <div class="terminal-line" style="color:#4ade80">    GNU/Linux Terminal</div>
        <div class="terminal-line" style="color:#4ade80">─────────────────────────────────────────</div>
        <div class="terminal-line" style="color:#fbbf24">Starting bash...</div>
    </div>
    <div class="terminal-input-area">
        <div class="terminal-prompt" id="prompt">user@host:~$</div>
        <input type="text" class="terminal-input" id="input" autofocus>
    </div>
</div>

<script>
(function() {
    let ws = null;
    let connected = false;
    let currentDir = '~';
    let history = [];
    let historyIndex = -1;
    let username = 'user';
    let hostname = 'gnu';
    let retries = 0;

    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const prompt = document.getElementById('prompt');
    const statusEl = document.getElementById('status');

    function setStatus(status, text) {
        statusEl.textContent = text;
        statusEl.className = `status status-${status}`;
        connected = status === 'connected';
        input.disabled = !connected;
        if (connected) input.focus();
    }

    function updatePrompt() {
        const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
        prompt.textContent = `${username}@${hostname}:${dir}$ `;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function stripAnsi(text) {
        let result = text;
        result = result.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
        result = result.replace(/\x1b\([A-Z]/g, '');
        result = result.replace(/\x1b=[0-9]/g, '');
        result = result.replace(/\x1b\]0;[^\x07]*\x07/g, '');
        result = result.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
        return result;
    }

    function parseAnsiColors(text) {
        let html = text;
        html = html.replace(/\x1b\[31m/g, '<span class="ansi-red">');
        html = html.replace(/\x1b\[32m/g, '<span class="ansi-green">');
        html = html.replace(/\x1b\[33m/g, '<span class="ansi-yellow">');
        html = html.replace(/\x1b\[34m/g, '<span class="ansi-blue">');
        html = html.replace(/\x1b\[35m/g, '<span class="ansi-magenta">');
        html = html.replace(/\x1b\[36m/g, '<span class="ansi-cyan">');
        html = html.replace(/\x1b\[37m/g, '<span class="ansi-white">');
        html = html.replace(/\x1b\[1m/g, '<span class="ansi-bold">');
        html = html.replace(/\x1b\[0m/g, '</span>');
        return html;
    }

    function appendOutput(text, isCmd = false) {
        const div = document.createElement('div');
        div.className = 'terminal-line';
        
        if (isCmd) {
            div.innerHTML = `<span style="color:#4ade80">${escapeHtml(prompt.textContent)}</span><span style="color:#b8d8b0">${escapeHtml(text)}</span>`;
        } else {
            const cleanText = stripAnsi(text);
            const coloredText = parseAnsiColors(cleanText);
            div.innerHTML = coloredText;
        }
        
        output.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function sendCommand(cmd) {
        if (!cmd.trim()) return;
        
        history.unshift(cmd);
        historyIndex = -1;
        appendOutput(cmd, true);
        
        if (cmd === 'clear' || cmd === 'cls') {
            output.innerHTML = '';
            const welcome = document.createElement('div');
            welcome.className = 'terminal-line';
            welcome.style.color = '#4ade80';
            welcome.textContent = '─────────────────────────────────────────\n    GNU/Linux Terminal\n─────────────────────────────────────────';
            output.appendChild(welcome);
            return;
        }
        
        if (cmd === 'exit') {
            appendOutput('\x1b[33mClosing terminal...\x1b[0m');
            setTimeout(() => {
                if (ws) ws.close();
                window.close();
            }, 500);
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(cmd);
        } else {
            appendOutput('\x1b[31mNot connected to server\x1b[0m');
        }
    }

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        
        setStatus('connecting', 'connecting');
        
        try {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                setStatus('connected', 'connected');
                retries = 0;
                appendOutput('\x1b[32m✓ GNU Terminal ready\x1b[0m');
                appendOutput('\x1b[36mType commands below. Use sudo for admin.\x1b[0m');
                appendOutput('');
                ws.send('__cwd__');
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    } else if (data.type === 'cwd') {
                        const home = `/home/${username}`;
                        if (data.data === home) {
                            currentDir = '~';
                        } else if (data.data.startsWith(home)) {
                            currentDir = '~' + data.data.substring(home.length);
                        } else {
                            currentDir = data.data;
                        }
                        updatePrompt();
                    } else if (data.type === 'ready') {
                        appendOutput(`\x1b[32m${data.message}\x1b[0m`);
                    }
                } catch(e) {
                    appendOutput(e.data || '');
                }
            };
            
            ws.onerror = () => {
                setStatus('disconnected', 'error');
                appendOutput('\x1b[31m✗ WebSocket error\x1b[0m');
            };
            
            ws.onclose = () => {
                setStatus('disconnected', 'disconnected');
                appendOutput('\x1b[31m✗ Connection lost\x1b[0m');
                
                if (retries < 5) {
                    retries++;
                    appendOutput(`\x1b[33m⚠ Reconnecting in ${retries}s...\x1b[0m`);
                    setTimeout(connect, retries * 1000);
                }
            };
        } catch(e) {
            appendOutput(`\x1b[31mFailed to connect: ${e.message}\x1b[0m`);
            setStatus('disconnected', 'error');
        }
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value;
            input.value = '';
            sendCommand(cmd);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
                historyIndex++;
                input.value = history[historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = history[historyIndex];
            } else if (historyIndex === 0) {
                historyIndex = -1;
                input.value = '';
            }
        } else if (e.key === 'l' && e.ctrlKey) {
            e.preventDefault();
            output.innerHTML = '';
            const welcome = document.createElement('div');
            welcome.className = 'terminal-line';
            welcome.style.color = '#4ade80';
            welcome.textContent = '─────────────────────────────────────────\n    GNU/Linux Terminal\n─────────────────────────────────────────';
            output.appendChild(welcome);
        }
    });

    document.body.addEventListener('click', () => {
        if (!input.disabled) input.focus();
    });

    try {
        const session = JSON.parse(localStorage.getItem('optimistic.session') || 'null');
        if (session && session.name) username = session.name;
    } catch(e) {}

    connect();
})();
</script>
</body>
</html>
