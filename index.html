<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimistic REAL Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e0a;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1e1a;
            padding: 10px 20px;
            border-bottom: 1px solid #2a3a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-title {
            color: #87b87f;
            font-weight: bold;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .status-connected { background: #1a3a1a; color: #87b87f; }
        .status-disconnected { background: #3a1a1a; color: #ff5f57; }
        .status-connecting { background: #3a3a1a; color: #febc2e; }

        .terminal-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0a0e0a;
        }

        .terminal-line {
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #0d1208;
            border-top: 1px solid #2a3a2a;
        }

        .prompt {
            color: #87b87f;
            font-family: monospace;
            font-size: 13px;
            white-space: nowrap;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #b8d8b0;
            font-family: monospace;
            font-size: 13px;
        }

        .terminal-container::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-container::-webkit-scrollbar-track {
            background: #1a1e1a;
        }
        .terminal-container::-webkit-scrollbar-thumb {
            background: #2a3a2a;
            border-radius: 4px;
        }

        .ansi-red { color: #ff5f57; }
        .ansi-green { color: #87b87f; }
        .ansi-yellow { color: #febc2e; }
        .ansi-blue { color: #6ab0f5; }
        .ansi-cyan { color: #6ab0f5; }
        .ansi-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div class="terminal-title">Optimistic REAL Terminal</div>
        <div class="connection-status status-connecting" id="connection-status">Connecting...</div>
    </div>
    <div class="terminal-container" id="terminal-container">
        <div class="terminal-line">\x1b[32m════════════════════════════════════════════\x1b[0m</div>
        <div class="terminal-line">\x1b[32m    Optimistic REAL Terminal\x1b[0m</div>
        <div class="terminal-line">\x1b[32m════════════════════════════════════════════\x1b[0m</div>
        <div class="terminal-line">\x1b[33mConnecting to backend...\x1b[0m</div>
    </div>
    <div class="terminal-input-line">
        <span class="prompt" id="prompt">user@optimistic:~$</span>
        <input type="text" class="input-field" id="command-input" autofocus>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let currentDir = '~';
        let commandHistory = [];
        let historyIndex = -1;
        let userInfo = { name: 'user', hostname: 'optimistic' };
        let reconnectAttempts = 0;

        const container = document.getElementById('terminal-container');
        const inputField = document.getElementById('command-input');
        const promptSpan = document.getElementById('prompt');
        const statusSpan = document.getElementById('connection-status');

        function parseANSICodes(text) {
            let html = text;
            html = html.replace(/\x1b\[32m/g, '<span class="ansi-green">');
            html = html.replace(/\x1b\[31m/g, '<span class="ansi-red">');
            html = html.replace(/\x1b\[33m/g, '<span class="ansi-yellow">');
            html = html.replace(/\x1b\[34m/g, '<span class="ansi-blue">');
            html = html.replace(/\x1b\[36m/g, '<span class="ansi-cyan">');
            html = html.replace(/\x1b\[1m/g, '<span class="ansi-bold">');
            html = html.replace(/\x1b\[0m/g, '</span>');
            return html;
        }

        function updateStatus(status, message) {
            statusSpan.textContent = message;
            statusSpan.className = `connection-status status-${status}`;
            isConnected = status === 'connected';
            inputField.disabled = status !== 'connected';
            if (isConnected) inputField.focus();
        }

        function appendOutput(text) {
            if (!text) return;
            const lines = text.split('\n');
            for (const line of lines) {
                const div = document.createElement('div');
                div.className = 'terminal-line';
                div.innerHTML = parseANSICodes(line);
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function updatePrompt() {
            const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
            promptSpan.innerHTML = `${userInfo.name}@${userInfo.hostname}:${dir}$ `;
        }

        function sendCommand(cmd) {
            if (!cmd.trim()) return;
            
            commandHistory.unshift(cmd);
            historyIndex = -1;
            
            const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
            const promptText = `${userInfo.name}@${userInfo.hostname}:${dir}$ `;
            const cmdLine = document.createElement('div');
            cmdLine.className = 'terminal-line';
            cmdLine.innerHTML = `<span style="color:#87b87f">${promptText}</span><span style="color:#b8d8b0">${escapeHtml(cmd)}</span>`;
            container.appendChild(cmdLine);
            container.scrollTop = container.scrollHeight;
            
            if (cmd === 'clear') {
                container.innerHTML = '';
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: cmd
                }));
            } else {
                appendOutput('\x1b[31m✗ Not connected to backend. Run: node server.js\x1b[0m');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.hostname}:3001`;
            
            updateStatus('connecting', 'Connecting...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('connected', 'Connected');
                reconnectAttempts = 0;
                appendOutput('\x1b[32m✓ Connected to REAL terminal backend!\x1b[0m');
                appendOutput('\x1b[36mYou can now run ACTUAL commands like:\x1b[0m');
                appendOutput('\x1b[33m  sudo apt update\x1b[0m');
                appendOutput('\x1b[33m  sudo apt install neofetch -y\x1b[0m');
                appendOutput('\x1b[33m  neofetch\x1b[0m');
                appendOutput('\x1b[33m  git clone https://github.com/...\x1b[0m');
                appendOutput('');
                ws.send(JSON.stringify({ type: 'cwd' }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    } else if (data.type === 'cwd') {
                        const homeDir = '/home/' + userInfo.name;
                        if (data.data === homeDir) {
                            currentDir = '~';
                        } else if (data.data.startsWith(homeDir)) {
                            currentDir = '~' + data.data.substring(homeDir.length);
